apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendations
  namespace: nats-shop
  labels:
    app: recommendations
spec:
  replicas: 2
  selector:
    matchLabels:
      app: recommendations
  template:
    metadata:
      labels:
        app: recommendations
    spec:
      containers:
        - name: recommendations
          image: nats-shop-recommendations:latest # Placeholder image name
          imagePullPolicy: IfNotPresent
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: NATS_URL
              value: "nats://nats:4222"
          resources:
            limits:
              cpu: "0.5"
              memory: "512Mi"
            requests:
              cpu: "0.1"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readinessz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
