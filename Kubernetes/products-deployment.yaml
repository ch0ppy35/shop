apiVersion: apps/v1
kind: Deployment
metadata:
  name: products
  namespace: nats-shop
  labels:
    app: products
spec:
  replicas: 2
  selector:
    matchLabels:
      app: products
  template:
    metadata:
      labels:
        app: products
    spec:
      containers:
        - name: products
          image: nats-shop-products:latest # Placeholder image name
          imagePullPolicy: IfNotPresent
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: DB_CONNECTION_STRING
              value: "Host=postgres;Database=products;Username=postgres;Password=postgres"
          resources:
            limits:
              cpu: "0.5"
              memory: "512Mi"
            requests:
              cpu: "0.1"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readinessz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
