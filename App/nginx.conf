server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Blazor WebAssembly specific settings
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # Serve static files
    location /css {
        try_files $uri =404;
    }

    location /js {
        try_files $uri =404;
    }

    location /lib {
        try_files $uri =404;
    }

    # Handle Blazor WebAssembly framework files
    location /_framework/ {
        try_files $uri =404;
    }

    # Set content types for WebAssembly files
    location ~ \.wasm$ {
        types { application/wasm wasm; }
        try_files $uri =404;
    }

    location ~ \.dll$ {
        types { application/octet-stream dll; }
        try_files $uri =404;
    }

    # Set caching headers for static assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Disable caching for WebAssembly framework files
    location ~* /_framework/.*\.(js|wasm|dll|json|dat)$ {
        add_header Cache-Control "no-cache";
        expires -1;
    }

    # Handle 404 errors
    error_page 404 /index.html;
}
