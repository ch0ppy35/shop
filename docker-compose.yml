version: '3.8'

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - nats-shop-network

  gateway:
    build:
      context: ./Services/Gateway
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
    networks:
      - nats-shop-network

  products:
    build:
      context: ./Services/Products
      dockerfile: Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
    networks:
      - nats-shop-network

networks:
  nats-shop-network:
    driver: bridge
