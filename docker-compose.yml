services:
  nats:
    image: nats:2.11
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - nats-shop-network

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      # Create database on startup
      - POSTGRES_MULTIPLE_DATABASES=products
    ports:
      - "5432:5432"
    volumes:
      # - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - nats-shop-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: Services/Gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
    networks:
      - nats-shop-network

  products:
    build:
      context: .
      dockerfile: Services/Products/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - DB_CONNECTION_STRING=Host=postgres;Database=products;Username=postgres;Password=postgres
    depends_on:
      - nats
      - postgres
    networks:
      - nats-shop-network

networks:
  nats-shop-network:
    driver: bridge

