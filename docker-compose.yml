version: '3.8'

services:
  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - nats-shop-network

  gateway:
    build:
      context: .
      dockerfile: Services/Gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
    networks:
      - nats-shop-network

  products:
    build:
      context: .
      dockerfile: Services/Products/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
    depends_on:
      - nats
    networks:
      - nats-shop-network

networks:
  nats-shop-network:
    driver: bridge
